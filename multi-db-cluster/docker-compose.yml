

services:
  mongo1:
    image: mongo:5.0
    hostname: mongo1
    volumes:
      - ./mongo-secrets:/mongo-secrets:ro  # Монтирование ключа
    command: 
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
      - --keyFile
      - /mongo-secrets/keyfile  # Путь к ключу
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh -u root -p example --quiet
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - db-network

  mongo2:
    image: mongo:5.0
    volumes:
      - ./mongo-secrets:/mongo-secrets:ro
    command: 
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
      - --keyFile
      - /mongo-secrets/keyfile
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    depends_on:
      mongo1:
        condition: service_healthy
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh -u root -p example --quiet
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - db-network

  mongo3:
    image: mongo:5.0
    volumes:
      - ./mongo-secrets:/mongo-secrets:ro
    command: 
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
      - --keyFile
      - /mongo-secrets/keyfile
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh -u root -p example --quiet
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - db-network

  mongo-init:
    image: mongo:5.0
    volumes:
      - ./mongo-secrets:/mongo-secrets:ro
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    command: >
      bash -c 'mongosh --host mongo1 -u root -p example --eval "rs.initiate({
        _id: \"rs0\",
        members: [
          {_id: 0, host: \"mongo1:27017\"},
          {_id: 1, host: \"mongo2:27017\"},
          {_id: 2, host: \"mongo3:27017\"}
        ]
      })" &&
      mongosh --host mongo1 -u root -p example --eval "rs.status()"'
    networks:
      - db-network

  # Cassandra Cluster (3 nodes) - FIXED
  cassandra-seed:
    image: cassandra:4.0
    hostname: cassandra-seed
    environment:
      CASSANDRA_CLUSTER_NAME: "AirportCluster"
      CASSANDRA_SEEDS: "cassandra-seed"
      CASSANDRA_DC: "dc1"
      CASSANDRA_RACK: "rack1"
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      HEAP_NEWSIZE: 512M
      MAX_HEAP_SIZE: 1024M
    healthcheck:
      test: cqlsh -e "describe cluster"
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - db-network

  cassandra-node2:
    image: cassandra:4.0
    hostname: cassandra-node2
    environment:
      CASSANDRA_SEEDS: "cassandra-seed"
      CASSANDRA_DC: "dc1"
      CASSANDRA_RACK: "rack1"
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      HEAP_NEWSIZE: 512M
      MAX_HEAP_SIZE: 1024M
    depends_on:
      cassandra-seed:
        condition: service_healthy
    networks:
      - db-network

  cassandra-node3:
    image: cassandra:4.0
    hostname: cassandra-node3
    environment:
      CASSANDRA_SEEDS: "cassandra-seed"
      CASSANDRA_DC: "dc1"
      CASSANDRA_RACK: "rack1"
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      HEAP_NEWSIZE: 512M
      MAX_HEAP_SIZE: 1024M
    depends_on:
      cassandra-seed:
        condition: service_healthy
      cassandra-node2:
        condition: service_started
    networks:
      - db-network

  # Neo4j Cluster (3 core nodes) - UNCHANGED
  neo4j-core1:
    build: ./neo4j
    hostname: neo4j-core1
    environment:
      NEO4J_causal__clustering_initial__discovery__members: neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000
      NEO4J_causal__clustering_discovery__advertised__address: neo4j-core1:5000
      NEO4J_causal__clustering_transaction__advertised__address: neo4j-core1:6000
      NEO4J_causal__clustering_raft__advertised__address: neo4j-core1:7000
      NEO4J_dbms_connector_bolt_advertised__address: neo4j-core1:7687
      NEO4J_dbms_connector_http_advertised__address: neo4j-core1:7474
      NEO4J_dbms_mode: CORE
      NEO4J_dbms_security_auth__enabled: "false"
    networks:
      - db-network

  neo4j-core2:
    build: ./neo4j
    hostname: neo4j-core2
    environment:
      NEO4J_causal__clustering_initial__discovery__members: neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000
      NEO4J_causal__clustering_discovery__advertised__address: neo4j-core2:5000
      NEO4J_causal__clustering_transaction__advertised__address: neo4j-core2:6000
      NEO4J_causal__clustering_raft__advertised__address: neo4j-core2:7000
      NEO4J_dbms_connector_bolt_advertised__address: neo4j-core2:7687
      NEO4J_dbms_connector_http_advertised__address: neo4j-core2:7474
      NEO4J_dbms_mode: CORE
      NEO4J_dbms_security_auth__enabled: "false"
    depends_on:
      - neo4j-core1
    networks:
      - db-network

  neo4j-core3:
    build: ./neo4j
    hostname: neo4j-core3
    environment:
      NEO4J_causal__clustering_initial__discovery__members: neo4j-core1:5000,neo4j-core2:5000,neo4j-core3:5000
      NEO4J_causal__clustering_discovery__advertised__address: neo4j-core3:5000
      NEO4J_causal__clustering_transaction__advertised__address: neo4j-core3:6000
      NEO4J_causal__clustering_raft__advertised__address: neo4j-core3:7000
      NEO4J_dbms_connector_bolt_advertised__address: neo4j-core3:7687
      NEO4J_dbms_connector_http_advertised__address: neo4j-core3:7474
      NEO4J_dbms_mode: CORE
      NEO4J_dbms_security_auth__enabled: "false"
    depends_on:
      - neo4j-core1
      - neo4j-core2
    networks:
      - db-network

networks:
  db-network:
    driver: bridge